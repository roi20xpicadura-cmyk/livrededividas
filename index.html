  <style>
    /* Inline splash — pinta ANTES do JS executar (FCP < 200ms).
       Removido pelo React assim que o app monta. */
    html, body { margin: 0; padding: 0; background: #050816; }
    #initial-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #0f172a 0%, #050816 70%);
      transition: opacity .25s ease;
    }
    #initial-splash.is-hidden { opacity: 0; pointer-events: none; }
    #initial-splash .mark {
      width: 84px; height: 84px; border-radius: 22px;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 55%, #6d28d9 100%);
      box-shadow: 0 22px 50px rgba(124,58,237,.45), inset 0 1px 0 rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      animation: splashPulse 1.6s ease-in-out infinite;
    }
    #initial-splash .mark::before {
      content: ""; width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.85); border-top-color: transparent;
      animation: splashSpin 1s linear infinite;
    }
    @keyframes splashPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes splashSpin { to { transform: rotate(360deg); } }
  </style>
</head>
  <body>
    <div id="initial-splash" aria-hidden="true"><div class="mark"></div></div>
    <div id="root"></div>
    <script>
      // Remove o splash inline assim que o React fizer a primeira render.
      // MutationObserver evita race condition com o lazy boot do main.tsx.
      (function () {
        var splash = document.getElementById('initial-splash');
        var root = document.getElementById('root');
        if (!splash || !root) return;
        var hide = function () {
          splash.classList.add('is-hidden');
          setTimeout(function () { splash.remove(); }, 280);
        };
        if (root.children.length > 0) { hide(); return; }
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) { obs.disconnect(); hide(); }
        });
        obs.observe(root, { childList: true });
        // Fail-safe: nunca prender o usuário no splash.
        setTimeout(function () { obs.disconnect(); hide(); }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
